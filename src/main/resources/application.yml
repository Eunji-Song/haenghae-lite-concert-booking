spring:
  application:
    name: hhplus
  profiles:
    active: local
  cache:
    type: redis
  
  data:
    redis:
      host: localhost
      port: 6379



  # 공통 (JPA는 Flyway가 스키마를 관리하므로 ddl-auto:none)
  jpa:
    open-in-view: false
    generate-ddl: false
    show-sql: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        timezone:
          default_storage: NORMALIZE_UTC
        jdbc:
          time_zone: UTC

  jackson:
    time-zone: Asia/Seoul

# JWT (공통)
jwt:
  access:
    secret: "h9J@3kLmP!s8zVxQ1rYtBnE2wU7dF4gH6aZcXvTqP0oRjSlMNbKdWuYpAzCfGh"
    expiry-seconds: 1800
  refresh:
    secret: "QwErTyUiOpAsDfGhJkLzXcVbNm1234567890!@#$%^&*()-_=+[]{},.<>/?"
    expiry-seconds: 2592000
  queue:
    secret: "zXcVbNmAsDfGhJkLqWeRtYuIoP0987654321)(*&^%$#@!~AaBbCcDdEeFf"
    expiry-seconds: 900


external:
  data-platform:
    base-url: http://localhost:8080



# -------------------------------------------------------------------
# local 프로파일: 로컬 개발 (이미 데이터가 있을 수 있으므로 baseline 허용)
# -------------------------------------------------------------------
---
spring:
  config:
    activate:
      on-profile: local

  datasource:
    name: HangHaePlusDataSource
    type: com.zaxxer.hikari.HikariDataSource
    url: jdbc:mysql://localhost:3307/hhplus?characterEncoding=UTF-8&serverTimezone=UTC
    username: application
    password: application
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 5
      connection-timeout: 15000
      max-lifetime: 180000

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: none

  flyway:
    enabled: true
    locations: classpath:db/migration
    # 이미 테이블이 있는 스키마일 수도 있으니 최초 1회 baseline 허용
    baseline-on-migrate: true
    baseline-version: 1
    schemas: hhplus
    default-schema: hhplus


  sql:
    init:
      mode: never   # data.sql 자동 실행 방지 (중복 insert 차단)

# -------------------------------------------------------------------
# dev 프로파일: 통합 환경(깨끗하거나 운영에 준하는 DB) - Flyway 단일 책임
# -------------------------------------------------------------------
---
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    name: HangHaePlusDataSource
    type: com.zaxxer.hikari.HikariDataSource
    url: jdbc:mysql://localhost:3306/hhplus?characterEncoding=UTF-8&serverTimezone=UTC
    username: application
    password: application
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 5
      connection-timeout: 15000
      max-lifetime: 180000

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: none

  flyway:
    enabled: true
    locations: classpath:db/migration
    # dev DB가 비어 있다면 false/설정 생략해도 됨. 기존 데이터가 있으면 true.
    baseline-on-migrate: false
    schemas: hhplus
    default-schema: hhplus

  sql:
    init:
      mode: never

